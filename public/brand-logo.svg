      <rect x="0" y="20" width="100" height="120" fill="#FFFFFF" />
      
      <!-- Draw the "S" cutout channel in solid black so it becomes 100% transparent -->
      <path d="M 12 73 C 10 51, 30 46, 50 46 C 72 46, 84 52, 84 65 C 84 78, 66 82, 50 85 C 34 88, 16 92, 16 105 C 16 118, 28 124, 50 124 C 70 124, 88 119, 88 97" fill="none" stroke="#000000" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round" />
    </mask>
  </defs>

  <!-- Crown Crest (Top Separated Element) -->
  <path d="M 50 0 C 65 22, 85 22, 100 10 C 99 18, 95 24, 90 28 C 75 15, 25 15, 10 28 C 5 24, 1 18, 0 10 C 15 22, 35 22, 50 0 Z" fill="#5A0C1A" />

  <!-- Shield Element, masked with our transparent S-cutout -->
  <path d="M 50 26 C 25 24, 8 35, 8 35 C 6 48, 6 62, 8 75 C 10 102, 26 122, 50 132 C 74 122, 90 102, 92 75 C 94 62, 94 48, 92 35 C 92 35, 75 24, 50 26 Z" fill="#5A0C1A" mask="url(#logo-s-mask)" />
</svg>
